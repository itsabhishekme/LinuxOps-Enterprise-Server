#=========================================================
# LinuxOps Enterprise Server
# File: configs/samba/smb.conf
# Description: Samba Configuration
#=========================================================

[global]

    workgroup = WORKGROUP
    server string = LinuxOps Enterprise Server
    netbios name = LINUXOPS
    server role = standalone server

    security = user
    map to guest = Bad User
    guest account = nobody

    dns proxy = no

    log file = /var/log/samba/log.%m
    max log size = 1000
    logging = file

    load printers = no
    printing = bsd
    printcap name = /dev/null
    disable spoolss = yes

    unix charset = UTF-8

    socket options = TCP_NODELAY SO_RCVBUF=65536 SO_SNDBUF=65536

    deadtime = 15

    obey pam restrictions = yes

    pam password change = yes

    passwd program = /usr/bin/passwd %u

    passwd chat = *New*Password* %n\n *Retype*new*Password* %n\n *password*updated*successfully*

    encrypt passwords = yes

    passdb backend = tdbsam

    invalid users = root

    hosts allow = 127. 192.168.0. 192.168.1. 10.
    hosts deny = ALL

    create mask = 0644
    directory mask = 0755

    force create mode = 0644
    force directory mode = 0755

    veto files = /*.tmp/*.bak/*.swp/

    hide unreadable = yes

    follow symlinks = yes

    wide links = no

    unix extensions = yes

    aio read size = 1
    aio write size = 1

    ea support = yes

    store dos attributes = yes

#=========================================================
# Public Share
#=========================================================

[Public]

    comment = LinuxOps Public Share

    path = /mnt/d/Linux/LinuxOps-Enterprise-Server/shares/public

    browseable = yes

    writable = yes

    read only = no

    guest ok = yes

    public = yes

    force user = nobody

    create mask = 0666

    directory mask = 0777

#=========================================================
# Private Share
#=========================================================

[Private]

    comment = LinuxOps Private Share

    path = /mnt/d/Linux/LinuxOps-Enterprise-Server/shares/private

    browseable = yes

    writable = yes

    read only = no

    guest ok = no

    valid users = @linuxops

    force group = linuxops

    create mask = 0660

    directory mask = 0770

#=========================================================
# Backup Share
#=========================================================

[Backups]

    comment = LinuxOps Backup Storage

    path = /mnt/d/Linux/LinuxOps-Enterprise-Server/backups

    browseable = yes

    writable = yes

    guest ok = no

    valid users = @linuxops

    read only = no

    create mask = 0660

    directory mask = 0770

#=========================================================
# Reports
#=========================================================

[Reports]

    comment = LinuxOps Monitoring Reports

    path = /mnt/d/Linux/LinuxOps-Enterprise-Server/reports

    browseable = yes

    writable = yes

    guest ok = no

    valid users = @linuxops

    read only = yes

#=========================================================
# Logs
#=========================================================

[Logs]

    comment = LinuxOps Server Logs

    path = /mnt/d/Linux/LinuxOps-Enterprise-Server/logs

    browseable = no

    writable = no

    guest ok = no

    valid users = @linuxops

    read only = yes

#=========================================================
# End of Configuration
#=========================================================