# ==========================================================
# LinuxOps Enterprise Server
# File: configs/nginx/linuxops.conf
# Description: Nginx Virtual Host Configuration
# ==========================================================

server {

    listen 80;
    listen [::]:80;

    server_name localhost;
    # Replace localhost with your domain
    # Example:
    # server_name linuxops.example.com www.linuxops.example.com;

    root /var/www/linuxops;
    index index.html index.htm;

    charset utf-8;

    access_log /var/log/nginx/linuxops_access.log;
    error_log  /var/log/nginx/linuxops_error.log;

    client_max_body_size 50M;

    location / {

        try_files $uri $uri/ /index.html;

    }

    location ~* \.(css)$ {

        expires 30d;
        add_header Cache-Control "public";

    }

    location ~* \.(js)$ {

        expires 30d;
        add_header Cache-Control "public";

    }

    location ~* \.(jpg|jpeg|png|gif|svg|ico|webp)$ {

        expires 30d;
        add_header Cache-Control "public";

    }

    location ~* \.(woff|woff2|ttf|eot)$ {

        expires 30d;
        add_header Cache-Control "public";

    }

    location ~ /\. {

        deny all;

    }

    error_page 404 /404.html;

    location = /404.html {

        internal;

    }

}

